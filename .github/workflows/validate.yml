name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate marketplace.json
        run: |
          python -c "
          import json
          import sys

          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)

          required_root = ['name', 'version', 'plugins']
          for field in required_root:
              if field not in data:
                  print(f'Missing required field: {field}')
                  sys.exit(1)

          for plugin in data['plugins']:
              required_plugin = ['name', 'version', 'description', 'source', 'keywords']
              for field in required_plugin:
                  if field not in plugin:
                      print(f\"Plugin {plugin.get('name', 'unknown')} missing field: {field}\")
                      sys.exit(1)

          print(f\"Validated {len(data['plugins'])} plugins\")
          "

      - name: Validate flat skills layout
        run: |
          python -c "
          import os
          import sys

          skills_dir = 'skills'
          errors = []

          for entry in os.listdir(skills_dir):
              entry_path = os.path.join(skills_dir, entry)
              if not os.path.isdir(entry_path):
                  continue
              # Check for nested category directories (not allowed)
              for sub in os.listdir(entry_path):
                  sub_path = os.path.join(entry_path, sub)
                  if os.path.isdir(sub_path) and os.path.exists(os.path.join(sub_path, 'SKILL.md')):
                      errors.append(f'Nested skill found: {sub_path}/SKILL.md — use flat layout skills/{sub}/ instead')

          if errors:
              for error in errors:
                  print(f'ERROR: {error}')
              sys.exit(1)

          print('Flat layout validated')
          "

      - name: Validate SKILL.md files
        run: |
          python -c "
          import os
          import yaml
          import sys

          skills_dir = 'skills'
          errors = []
          warnings = []
          validated = 0

          for entry in sorted(os.listdir(skills_dir)):
              entry_path = os.path.join(skills_dir, entry)
              if not os.path.isdir(entry_path):
                  continue

              skill_path = os.path.join(entry_path, 'SKILL.md')
              if not os.path.exists(skill_path):
                  errors.append(f'{entry_path}: Missing SKILL.md')
                  continue

              with open(skill_path) as f:
                  content = f.read()

              # Check for frontmatter
              if not content.startswith('---'):
                  errors.append(f'{skill_path}: Missing YAML frontmatter')
                  continue

              # Extract frontmatter
              parts = content.split('---', 2)
              if len(parts) < 3:
                  errors.append(f'{skill_path}: Invalid frontmatter format')
                  continue

              try:
                  frontmatter = yaml.safe_load(parts[1])
              except yaml.YAMLError as e:
                  errors.append(f'{skill_path}: Invalid YAML: {e}')
                  continue

              # Check required fields
              if 'name' not in frontmatter:
                  errors.append(f'{skill_path}: Missing required field: name')
              if 'description' not in frontmatter:
                  errors.append(f'{skill_path}: Missing required field: description')

              # Check recommended fields
              metadata = frontmatter.get('metadata', {})
              if not metadata or 'author' not in metadata:
                  warnings.append(f'{skill_path}: Missing recommended field: metadata.author')
              if not metadata or 'version' not in metadata:
                  warnings.append(f'{skill_path}: Missing recommended field: metadata.version')

              validated += 1

          for warning in warnings:
              print(f'WARNING: {warning}')

          if errors:
              for error in errors:
                  print(f'ERROR: {error}')
              sys.exit(1)

          print(f'Validated {validated} skill files')
          "

      - name: Check local plugin sources exist
        run: |
          python -c "
          import json
          import os
          import sys

          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)

          errors = []
          for plugin in data['plugins']:
              source = plugin['source']
              # Skip remote sources (GitHub refs)
              if isinstance(source, dict):
                  continue
              # Check local sources
              if isinstance(source, str):
                  path = source.lstrip('./')
                  plugin_json = os.path.join(path, '.claude-plugin', 'plugin.json')
                  if not os.path.exists(plugin_json):
                      errors.append(f\"Plugin {plugin['name']}: plugin.json not found at {plugin_json}\")

          if errors:
              for error in errors:
                  print(f'ERROR: {error}')
              sys.exit(1)

          print('All local plugin sources validated')
          "
